<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Bitcoin circle background -->
  <circle cx="64" cy="64" r="60" fill="#F7931A" stroke="#E17C00" stroke-width="3"/>
  
  <!-- Bitcoin B symbol -->
  <g transform="translate(64, 64)" fill="white">
    <!-- Main vertical line -->
    <rect x="-20" y="-30" width="6" height="60"/>
    
    <!-- Top horizontal line -->
    <rect x="-20" y="-30" width="25" height="6"/>
    
    <!-- Middle horizontal line -->
    <rect x="-20" y="-3" width="23" height="6"/>
    
    <!-- Bottom horizontal line -->
    <rect x="-20" y="24" width="25" height="6"/>
    
    <!-- Top curve -->
    <path d="M 5 -30 Q 15 -30 15 -15 Q 15 -3 5 -3" stroke="white" stroke-width="6" fill="none"/>
    
    <!-- Bottom curve -->
    <path d="M 3 3 Q 17 3 17 18 Q 17 30 3 30" stroke="white" stroke-width="6" fill="none"/>
    
    <!-- Vertical extensions -->
    <rect x="-8" y="-40" width="4" height="10"/>
    <rect x="-8" y="30" width="4" height="10"/>
    <rect x="-4" y="-40" width="4" height="10"/>
    <rect x="-4" y="30" width="4" height="10"/>
  </g>
</svg>
